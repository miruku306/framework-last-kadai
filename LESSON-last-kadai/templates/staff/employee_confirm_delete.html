{% extends 'base.html' %}
{% block content %}
<h1>データを削除しますか？</h1>
<p>「{{ user.name }}」を削除しようとしています。この操作は取り消せません。</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" style="background-color: red; color: white;">本当に削除する</button>
    <a href="{% url 'staff_list' %}">キャンセル</a>
</form>
{% endblock %}
